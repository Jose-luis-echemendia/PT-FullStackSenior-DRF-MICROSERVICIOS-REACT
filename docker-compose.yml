name: ecommerce-microservices

x-django-env: &django-env
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "*"
  CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8080"
  RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/"

services:
  # ------------------------------------------------------------------ #
  # Databases (one per service)                                        #
  # ------------------------------------------------------------------ #
  products-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: ${DB_USER:-ecommerce}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes: [products-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecommerce}"]
      interval: 5s
      retries: 10

  cart-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: ${DB_USER:-ecommerce}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes: [cart-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecommerce}"]
      interval: 5s
      retries: 10

  orders-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: ${DB_USER:-ecommerce}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes: [orders-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecommerce}"]
      interval: 5s
      retries: 10

  # ------------------------------------------------------------------ #
  # Message broker                                                     #
  # ------------------------------------------------------------------ #
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 10

  # ------------------------------------------------------------------ #
  # Products service (API + event consumer)                            #
  # ------------------------------------------------------------------ #
  products:
    build: ./services/products
    environment:
      <<: *django-env
      DATABASE_URL: "postgres://${DB_USER:-ecommerce}:${DB_PASSWORD:-changeme}@products-db:5432/products_db"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_products &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 3"
    depends_on:
      products-db: {condition: service_healthy}
      rabbitmq: {condition: service_healthy}

  products-consumer:
    build: ./services/products
    environment:
      <<: *django-env
      DATABASE_URL: "postgres://${DB_USER:-ecommerce}:${DB_PASSWORD:-changeme}@products-db:5432/products_db"
    command: ["python", "manage.py", "consume_events"]
    depends_on:
      products: {condition: service_started}
      rabbitmq: {condition: service_healthy}

  # ------------------------------------------------------------------ #
  # Cart service (API + event consumer)                                #
  # ------------------------------------------------------------------ #
  cart:
    build: ./services/cart
    environment:
      <<: *django-env
      DATABASE_URL: "postgres://${DB_USER:-ecommerce}:${DB_PASSWORD:-changeme}@cart-db:5432/cart_db"
      PRODUCTS_SERVICE_URL: "http://products:8001"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8002 --workers 3"
    depends_on:
      cart-db: {condition: service_healthy}
      products: {condition: service_started}
      rabbitmq: {condition: service_healthy}

  cart-consumer:
    build: ./services/cart
    environment:
      <<: *django-env
      DATABASE_URL: "postgres://${DB_USER:-ecommerce}:${DB_PASSWORD:-changeme}@cart-db:5432/cart_db"
    command: ["python", "manage.py", "consume_events"]
    depends_on:
      cart: {condition: service_started}
      rabbitmq: {condition: service_healthy}

  # ------------------------------------------------------------------ #
  # Orders service (API; publishes events)                             #
  # ------------------------------------------------------------------ #
  orders:
    build: ./services/orders
    environment:
      <<: *django-env
      DATABASE_URL: "postgres://${DB_USER:-ecommerce}:${DB_PASSWORD:-changeme}@orders-db:5432/orders_db"
      CART_SERVICE_URL: "http://cart:8002"
      PRODUCTS_SERVICE_URL: "http://products:8001"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8003 --workers 3"
    depends_on:
      orders-db: {condition: service_healthy}
      cart: {condition: service_started}
      products: {condition: service_started}
      rabbitmq: {condition: service_healthy}

  # ------------------------------------------------------------------ #
  # API Gateway + Frontend                                             #
  # ------------------------------------------------------------------ #
  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - products
      - cart
      - orders

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - gateway

volumes:
  products-data:
  cart-data:
  orders-data:
