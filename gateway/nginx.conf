upstream products_upstream { server products:8001; }
upstream cart_upstream     { server cart:8002; }
upstream orders_upstream   { server orders:8003; }

server {
    listen 80;
    server_name _;

    # Shared proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-User-Id $http_x_user_id;

    location /api/products/ {
        proxy_pass http://products_upstream;
    }

    location /api/cart/ {
        proxy_pass http://cart_upstream;
    }

    location /api/orders/ {
        proxy_pass http://orders_upstream;
    }

    location /healthz {
        return 200 'gateway-ok';
        add_header Content-Type text/plain;
    }
}
